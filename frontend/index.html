<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agent Store - Ai_AutoSDLC</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="./node_modules/@sxf/sf-theme/dist/brand.css">
    <link rel="stylesheet" href="./node_modules/@sxf/er-components/default.css">
    <link rel="stylesheet" href="./src/styles.css">
  </head>
  <body>
    <div id="app" class="app-root">
      <sdlc-shell
        :catalog="filteredCatalog"
        :catalog-total-count="catalog.length"
        :discovery-collections="discoveryCollections"
        :discovery-stats="discoveryStats"
        :discovery-highlight="discoveryHighlight"
        :selected-agent-id="activeSelectedAgentId"
        :search-query="searchQuery"
        :discovery-collection="discoveryCollection"
        :type-filter="typeFilter"
        :trust-filter="trustFilter"
        :installability-filter="installabilityFilter"
        :view="selectedView"
        :agentops="selectedAgentops"
        :bootstrap="selectedBootstrap"
        :trusted-loop="selectedTrustedLoop"
        :state-decision="selectedStateDecision"
        :install-workflow="selectedInstallWorkflow"
        :install-request="selectedInstallationRequest"
        :recommendation-decision="selectedRecommendationDecision"
        :listing-wizard="selectedListingWizard"
        :draft-review-submission="selectedDraftReviewSubmission"
        :runtime-availability="selectedRuntimeAvailability"
        :health-summary-freshness="selectedHealthSummaryFreshness"
        :installation-distribution="selectedInstallationDistribution"
        :feedback-owner-response-loop="selectedFeedbackOwnerResponseLoop"
        :lifecycle-governance="selectedLifecycleGovernance"
        :quality-evidence-access="selectedQualityEvidenceAccess"
        :store-ops-deep-link="selectedStoreOpsDeepLink"
        :policy-approval-echo="selectedPolicyApprovalEcho"
        :managed-installer-preview="selectedManagedInstallerPreview"
        :policy-approval-request="selectedPolicyApprovalRequest"
        :policy-approval-receipt="selectedPolicyApprovalReceipt"
        :notification-routing="selectedNotificationRouting"
        :permission-denial-action="selectedPermissionDenialAction"
        :install-handoff="selectedBootstrapHandoff"
        :assertion-handoff="selectedAssertionHandoff"
        :action-feedback="actionFeedback"
        @select-agent="selectAgent"
        @update-search="updateSearch"
        @set-discovery-collection="setDiscoveryCollection"
        @set-type-filter="setTypeFilter"
        @set-trust-filter="setTrustFilter"
        @set-installability-filter="setInstallabilityFilter"
        @invoke-action="invokeAction"
      ></sdlc-shell>
    </div>
    <script src="./node_modules/vue/dist/vue.js"></script>
    <script src="./src/sdlc-enterprise-vue2.js"></script>
    <script src="./src/mock-data.js"></script>
    <script src="./src/app.js"></script>
  </body>
</html>
