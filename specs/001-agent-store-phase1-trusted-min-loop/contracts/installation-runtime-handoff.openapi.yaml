openapi: 3.1.0
info:
  title: Agent Store Installation Runtime Handoff API
  version: 0.1.0
security:
  - bearerAuth: []
paths:
  /api/v1/installations/{installation_id}/runtime-handoff:
    post:
      operationId: createInstallationRuntimeHandoff
      summary: Project Store-owned installation and device binding facts for Runtime consumption
      parameters:
        - name: installation_id
          in: path
          required: true
          schema:
            type: string
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstallationRuntimeHandoffRequest"
      responses:
        "200":
          description: Runtime handoff projection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstallationRuntimeHandoffResponse"
        "400":
          description: Malformed runtime handoff request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller auth context cannot access installation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Installation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Idempotency key conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    InstallationRuntimeHandoffRequest:
      type: object
      properties:
        trace_id:
          type: string
        audit_id:
          type: string
        runtime_echo:
          $ref: "#/components/schemas/RuntimeHandoffEcho"
    RuntimeHandoffEcho:
      type: object
      properties:
        runtime_id:
          type: string
        installation_id:
          type: string
        device_id:
          type: string
        artifact_hash:
          type: string
        observed_artifact_hash:
          type: string
        observed_at:
          type: string
        handoff_ref:
          type: string
    InstallationRuntimeHandoffResponse:
      type: object
      required:
        - schema_version
        - trace_id
        - error_code
        - audit_id
        - installation_runtime_handoff
      properties:
        schema_version:
          type: string
        trace_id:
          type: string
        error_code:
          type: string
          enum: [OK]
        audit_id:
          type: string
        installation_runtime_handoff:
          $ref: "#/components/schemas/InstallationRuntimeHandoff"
    InstallationRuntimeHandoff:
      type: object
      required:
        - contract_schema_version
        - handoff_id
        - installation_id
        - handoff_state
        - display_name_zh
        - reason_code
        - reason
        - runtime_consumption_allowed
        - installation
        - device_binding
        - runtime_echo
        - issues
        - source_of_truth
        - next_action
      properties:
        contract_schema_version:
          type: string
          enum: [installation_runtime_handoff.v1]
        handoff_id:
          type: string
        installation_id:
          type: string
        handoff_state:
          type: string
          enum:
            - runtime_handoff_ready
            - artifact_hash_mismatch
            - device_binding_mismatch
            - installation_not_ready
        display_name_zh:
          type: string
        reason_code:
          type: string
        reason:
          type: string
        runtime_consumption_allowed:
          type: boolean
        installation:
          $ref: "#/components/schemas/InstallationFact"
        device_binding:
          $ref: "#/components/schemas/DeviceBindingFact"
        runtime_echo:
          $ref: "#/components/schemas/RuntimeHandoffEcho"
        issues:
          type: array
          items:
            $ref: "#/components/schemas/InstallationRuntimeHandoffIssue"
        source_of_truth:
          $ref: "#/components/schemas/InstallationRuntimeSourceOfTruth"
        next_action:
          $ref: "#/components/schemas/ActionDescriptor"
    InstallationFact:
      type: object
      required:
        - installation_id
        - device_id
        - agent_id
        - agent_version
        - artifact_hash
        - status
        - enterprise_state
      properties:
        installation_id:
          type: string
        device_id:
          type: string
        agent_id:
          type: string
        agent_version:
          type: string
        artifact_hash:
          type: string
        status:
          type: string
          enum: [not_installed, activation_required, reporter_pending, failed, revoked]
        enterprise_state:
          type: string
          enum: [detected_optional, required_unactivated, activating, active, degraded, disabled]
    DeviceBindingFact:
      type: object
      required:
        - device_id
        - installation_id
        - user
        - artifact_hash
        - device_public_key_thumbprint
        - status
      properties:
        device_id:
          type: string
        installation_id:
          type: string
        user:
          type: string
        artifact_hash:
          type: string
        device_public_key_thumbprint:
          type: string
        status:
          type: string
          enum: [active, expired, revoked]
    InstallationRuntimeHandoffIssue:
      type: object
      required: [issue_id, field_path, severity, reason, impact, fix_action_id, message_key]
      properties:
        issue_id:
          type: string
          enum:
            - ARTIFACT_HASH_MISMATCH
            - DEVICE_BINDING_MISMATCH
            - DEVICE_BINDING_NOT_ACTIVE
            - INSTALLATION_NOT_READY
        field_path:
          type: string
        severity:
          type: string
          enum: [info, warning, error, blocked]
        reason:
          type: string
        impact:
          type: string
        fix_action_id:
          type: string
        message_key:
          type: string
    InstallationRuntimeSourceOfTruth:
      type: object
      required:
        - installation
        - device_binding
        - package
        - runtime_consumption
        - policy_decision
      properties:
        installation:
          type: string
          enum: [agent_store]
        device_binding:
          type: string
          enum: [agent_store]
        package:
          type: string
          enum: [agent_store]
        runtime_consumption:
          type: string
          enum: [agent_runtime_echo_or_request]
        policy_decision:
          type: string
          enum: [agentops]
    ActionDescriptor:
      type: object
      required: [action_id, target_system, enabled]
      properties:
        action_id:
          type: string
        target_system:
          type: string
          enum: [agent_store, agent_runtime, agentops, ai_autosdlc_cli, evidence_vault]
        enabled:
          type: boolean
        requires_permission:
          type: boolean
        audit_required:
          type: boolean
        href:
          type: string
        message_key:
          type: string
    ErrorResponse:
      type: object
      required:
        - schema_version
        - trace_id
        - error_code
        - message_key
        - severity
        - retryable
        - recommended_action_id
      properties:
        schema_version:
          type: string
        trace_id:
          type: string
        error_code:
          type: string
          enum:
            - VALIDATION_ERROR
            - PERMISSION_DENIED
            - INSTALLATION_NOT_FOUND
            - IDEMPOTENCY_KEY_CONFLICT
        message:
          type: string
          deprecated: true
        message_key:
          type: string
        severity:
          type: string
          enum: [info, warning, error, blocked]
        retryable:
          type: boolean
        recommended_action_id:
          type: string
        support_ref:
          type: string
        audit_id:
          type: string
        details:
          type: object
