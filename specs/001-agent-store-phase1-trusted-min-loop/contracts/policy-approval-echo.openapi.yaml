openapi: 3.1.0
info:
  title: Agent Store Policy Approval Echo API
  version: 0.1.0
paths:
  /api/v1/agents/policy-approval-echoes:
    post:
      operationId: projectPolicyApprovalEcho
      summary: Project AgentOps-owned policy and approval echo for Store display
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PolicyApprovalEchoRequest"
      responses:
        "200":
          description: Policy approval echo projection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyApprovalEchoResponse"
        "400":
          description: Malformed policy approval echo request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Idempotency key conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    PolicyApprovalEchoRequest:
      type: object
      required: [agent_id, agent_version, agentops_policy_echo]
      properties:
        trace_id:
          type: string
        audit_id:
          type: string
        agent_id:
          type: string
        agent_version:
          type: string
        agentops_policy_echo:
          $ref: "#/components/schemas/AgentOpsPolicyEcho"
    AgentOpsPolicyEcho:
      type: object
      required: [policy_decision]
      properties:
        policy_decision:
          $ref: "#/components/schemas/AgentOpsPolicyDecision"
        approval:
          $ref: "#/components/schemas/AgentOpsApproval"
    AgentOpsPolicyDecision:
      type: object
      required: [policy_decision_id, decision, policy_ref, evaluated_at]
      properties:
        policy_decision_id:
          type: string
        decision:
          type: string
          enum: [allow, deny, approval_required]
        policy_ref:
          type: string
        reason_code:
          type: string
        evaluated_at:
          type: string
          format: date-time
        valid_until:
          type: string
          format: date-time
        trace_id:
          type: string
        audit_id:
          type: string
    AgentOpsApproval:
      type: object
      properties:
        approval_id:
          type: string
        status:
          type: string
          enum: [not_required, pending, approved, rejected, expired, revoked]
        decision:
          type: string
        expires_at:
          type: string
          format: date-time
        request_access_url:
          type: string
        audit_id:
          type: string
    PolicyApprovalEchoResponse:
      type: object
      required: [schema_version, trace_id, error_code, audit_id, policy_approval_echo]
      properties:
        schema_version:
          type: string
        trace_id:
          type: string
        error_code:
          type: string
          enum: [OK]
        audit_id:
          type: string
        policy_approval_echo:
          $ref: "#/components/schemas/PolicyApprovalEcho"
    PolicyApprovalEcho:
      type: object
      required:
        - contract_schema_version
        - agent_id
        - agent_version
        - echo_state
        - policy_decision
        - approval_summary
        - store_projection
        - issues
        - source_of_truth
        - next_action
      properties:
        contract_schema_version:
          type: string
          enum: [policy_approval_echo.v1]
        agent_id:
          type: string
        agent_version:
          type: string
        echo_state:
          type: string
          enum:
            - policy_allowed
            - approval_pending
            - approval_expired
            - policy_denied
            - agentops_echo_unavailable
        policy_decision:
          $ref: "#/components/schemas/PolicyDecisionSnapshot"
        approval_summary:
          $ref: "#/components/schemas/ApprovalSummarySnapshot"
        store_projection:
          $ref: "#/components/schemas/StoreProjection"
        issues:
          type: array
          items:
            $ref: "#/components/schemas/PolicyApprovalEchoIssue"
        source_of_truth:
          $ref: "#/components/schemas/PolicyApprovalSourceOfTruth"
        next_action:
          $ref: "#/components/schemas/ActionDescriptor"
    PolicyDecisionSnapshot:
      type: object
      required:
        - policy_decision_id
        - decision
        - policy_ref
        - reason_code
        - evaluated_at
        - valid_until
        - agentops_trace_id
        - agentops_audit_id
      properties:
        policy_decision_id:
          type: string
        decision:
          type: string
        policy_ref:
          type: string
        reason_code:
          type: string
        evaluated_at:
          type: string
        valid_until:
          type: string
        agentops_trace_id:
          type: string
        agentops_audit_id:
          type: string
    ApprovalSummarySnapshot:
      type: object
      required:
        - approval_id
        - status
        - decision
        - expires_at
        - request_access_url
        - agentops_audit_id
      properties:
        approval_id:
          type: string
        status:
          type: string
          enum: [not_required, pending, approved, rejected, expired, revoked]
        decision:
          type: string
        expires_at:
          type: string
        request_access_url:
          type: string
        agentops_audit_id:
          type: string
    StoreProjection:
      type: object
      required:
        - projection_mode
        - store_decision_authority
        - agentops_decision
        - store_override_allowed
        - capability_grant_issued
        - store_may_continue
        - store_block_reason
      properties:
        projection_mode:
          type: string
          enum: [agentops_echo_only]
        store_decision_authority:
          type: string
          enum: [none]
        agentops_decision:
          type: string
        store_override_allowed:
          type: boolean
          const: false
        capability_grant_issued:
          type: boolean
          const: false
        store_may_continue:
          type: boolean
        store_block_reason:
          type: string
    PolicyApprovalEchoIssue:
      type: object
      required: [issue_id, field_path, severity, reason, impact, fix_action_id, message_key]
      properties:
        issue_id:
          type: string
          enum:
            - AGENTOPS_POLICY_ECHO_INCOMPLETE
            - AGENTOPS_POLICY_DECISION_UNSUPPORTED
            - AGENTOPS_APPROVAL_STATUS_UNSUPPORTED
            - AGENTOPS_APPROVAL_EXPIRES_AT_INVALID
            - AGENTOPS_APPROVAL_EXPIRED
        field_path:
          type: string
        severity:
          type: string
          enum: [info, warning, error, blocked]
        reason:
          type: string
        impact:
          type: string
        fix_action_id:
          type: string
        message_key:
          type: string
    PolicyApprovalSourceOfTruth:
      type: object
      required:
        - policy_decision
        - approval
        - capability_grant
        - store_projection
      properties:
        policy_decision:
          type: string
          enum: [agentops]
        approval:
          type: string
          enum: [agentops]
        capability_grant:
          type: string
          enum: [agentops_not_issued_by_store]
        store_projection:
          type: string
          enum: [agent_store_echo_only]
    ActionDescriptor:
      type: object
      required: [action_id, target_system, enabled]
      properties:
        action_id:
          type: string
        target_system:
          type: string
          enum: [agent_store, agent_runtime, agentops, ai_autosdlc_cli, evidence_vault]
        enabled:
          type: boolean
        requires_permission:
          type: boolean
        audit_required:
          type: boolean
        href:
          type: string
        message_key:
          type: string
    ErrorResponse:
      type: object
      required:
        - schema_version
        - trace_id
        - error_code
        - message_key
        - severity
        - retryable
        - recommended_action_id
      properties:
        schema_version:
          type: string
        trace_id:
          type: string
        error_code:
          type: string
          enum: [VALIDATION_ERROR, IDEMPOTENCY_KEY_CONFLICT]
        message_key:
          type: string
        severity:
          type: string
        retryable:
          type: boolean
        recommended_action_id:
          type: string
        support_ref:
          type: string
        audit_id:
          type: string
        details:
          type: object
