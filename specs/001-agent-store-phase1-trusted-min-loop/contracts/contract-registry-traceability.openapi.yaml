openapi: 3.0.3
info:
  title: Agent Store Contract Registry Traceability API
  version: 1.0.0
paths:
  /api/v1/contracts/traceability:
    get:
      operationId: listContractRegistryTraceability
      summary: List contract registry traceability metadata
      responses:
        "200":
          description: Contract registry traceability projection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractRegistryTraceabilityResponse"
components:
  schemas:
    ContractRegistryTraceabilityResponse:
      type: object
      required:
        - schema_version
        - trace_id
        - error_code
        - audit_id
        - contract_traceability
      properties:
        schema_version:
          type: string
          enum:
            - agent-store.phase1.v1
        trace_id:
          type: string
        error_code:
          type: string
          enum:
            - OK
        audit_id:
          type: string
        contract_traceability:
          $ref: "#/components/schemas/ContractRegistryTraceability"
    ContractRegistryTraceability:
      type: object
      required:
        - contract_schema_version
        - registry_status
        - contracts
        - coverage_summary
        - source_of_truth
        - next_action
      properties:
        contract_schema_version:
          type: string
          enum:
            - contract_registry_traceability.v1
        registry_status:
          type: string
          enum:
            - complete
            - incomplete
        contracts:
          type: array
          items:
            $ref: "#/components/schemas/ContractTraceabilityEntry"
        coverage_summary:
          $ref: "#/components/schemas/ContractCoverageSummary"
        source_of_truth:
          $ref: "#/components/schemas/ContractRegistrySourceOfTruth"
        next_action:
          $ref: "#/components/schemas/ActionDescriptor"
    ContractTraceabilityEntry:
      type: object
      required:
        - contract_id
        - contract_file
        - primary_schema
        - owner
        - producer
        - consumers
        - cct_ids
        - contract_test_files
        - appendix_anchor
      properties:
        contract_id:
          type: string
          enum:
            - agent_manifest_runtime_contract.v1
            - agent_registry_draft.v1
            - agentops_summary.v1
            - contract_registry_traceability.v1
            - draft_review_submission.v1
            - feedback_owner_response_loop.v1
            - health_summary_freshness.v1
            - installation_bootstrap.v1
            - installation_runtime_handoff.v1
            - lifecycle_governance_baseline.v1
            - managed_installer_preview.v1
            - package_validation_report.v1
            - policy_approval_echo.v1
            - recommendation_state.v1
            - runtime_availability_summary.v1
            - skill_registry_notification.v1
            - skill_registry.v1
            - trusted_evidence_loop.v1
        contract_file:
          type: string
        primary_schema:
          type: string
        owner:
          type: string
          enum:
            - Agent Store
            - AgentOps
            - Agent Runtime
        producer:
          type: string
          enum:
            - Agent Store
            - AgentOps
            - Agent Runtime
        consumers:
          type: array
          minItems: 1
          items:
            type: string
            enum:
              - Agent Store
              - Agent Store UI
              - AgentOps
              - Agent Runtime
              - Ai_AutoSDLC
        cct_ids:
          type: array
          items:
            type: string
        contract_test_files:
          type: array
          minItems: 1
          items:
            type: string
        appendix_anchor:
          type: string
    ContractCoverageSummary:
      type: object
      required:
        - total_contracts
        - contracts_with_cct
        - contracts_with_contract_tests
        - complete_traceability
        - unmapped_contracts
      properties:
        total_contracts:
          type: integer
          minimum: 0
        contracts_with_cct:
          type: integer
          minimum: 0
        contracts_with_contract_tests:
          type: integer
          minimum: 0
        complete_traceability:
          type: integer
          minimum: 0
        unmapped_contracts:
          type: integer
          minimum: 0
    ContractRegistrySourceOfTruth:
      type: object
      required:
        - contract_files
        - appendix
        - contract_tests
        - registry_projection
      properties:
        contract_files:
          type: string
          enum:
            - specs/001-agent-store-phase1-trusted-min-loop/contracts
        appendix:
          type: string
          enum:
            - docs/cross-project-contract-appendix.md
        contract_tests:
          type: string
          enum:
            - tests/contract
        registry_projection:
          type: string
          enum:
            - agent_store
    ActionDescriptor:
      type: object
      required:
        - action_id
        - target_system
        - enabled
        - requires_permission
        - audit_required
        - message_key
      properties:
        action_id:
          type: string
          enum:
            - continue_contract_change_review
            - complete_contract_traceability
        target_system:
          type: string
          enum:
            - agent_store
        enabled:
          type: boolean
        requires_permission:
          type: boolean
        audit_required:
          type: boolean
        message_key:
          type: string
