openapi: 3.1.0
info:
  title: Agent Store Runtime Availability Summary API
  version: 0.1.0
paths:
  /api/v1/agent-manifests/runtime-availability-summaries:
    post:
      operationId: summarizeRuntimeAvailability
      summary: Project Runtime echo/probe facts into a Store-owned availability summary
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeAvailabilitySummaryRequest"
      responses:
        "200":
          description: Runtime availability summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeAvailabilitySummaryResponse"
        "400":
          description: Malformed runtime availability request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Idempotency key conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    RuntimeAvailabilitySummaryRequest:
      type: object
      required: [agent_manifest]
      properties:
        trace_id:
          type: string
        audit_id:
          type: string
        agent_manifest:
          $ref: "#/components/schemas/AgentManifest"
        runtime_echo:
          $ref: "#/components/schemas/RuntimeAvailabilityEcho"
    AgentManifest:
      type: object
      required:
        - manifest_schema_version
        - agent_id
        - version
        - artifact_hash
        - runtime_contract_version
        - required_runtime_capabilities
        - skills
        - permission_intents
        - data_scopes
        - secret_refs
        - network_allowlist
        - observability_contract
        - guardrail_refs
        - rollback_policy
        - provenance
      properties:
        manifest_schema_version:
          type: string
        agent_id:
          type: string
        version:
          type: string
        artifact_hash:
          type: string
        runtime_contract_version:
          type: string
        required_runtime_capabilities:
          type: array
          items:
            type: string
        skills:
          type: array
          items:
            $ref: "#/components/schemas/AgentManifestSkillRef"
        permission_intents:
          type: array
          items:
            type: string
        data_scopes:
          type: array
          items:
            type: string
        secret_refs:
          type: array
          items:
            type: string
        network_allowlist:
          type: array
          items:
            type: string
        observability_contract:
          $ref: "#/components/schemas/ObservabilityContract"
        guardrail_refs:
          type: array
          items:
            type: string
        rollback_policy:
          type: string
        provenance:
          $ref: "#/components/schemas/ManifestProvenance"
    AgentManifestSkillRef:
      type: object
      required: [skill_id, skill_version]
      properties:
        skill_id:
          type: string
        skill_version:
          type: string
    ObservabilityContract:
      type: object
      required: [trace_spans]
      properties:
        trace_spans:
          type: array
          items:
            type: string
        event_types:
          type: array
          items:
            type: string
        outbox_required:
          type: boolean
    ManifestProvenance:
      type: object
      properties:
        source_repo:
          type: string
        source_commit:
          type: string
        build_ref:
          type: string
        issuer:
          type: string
    RuntimeAvailabilityEcho:
      type: object
      properties:
        runtime_id:
          type: string
        availability_state:
          type: string
          enum: [available, ready, running, installed, healthy, missing, not_installed, unavailable, offline, unknown]
        runtime_present:
          type: boolean
        runtime_contract_version:
          type: string
        capabilities:
          type: array
          items:
            type: string
        observed_at:
          type: string
        probe_ref:
          type: string
    RuntimeAvailabilitySummaryResponse:
      type: object
      required:
        - schema_version
        - trace_id
        - error_code
        - audit_id
        - runtime_availability_summary
      properties:
        schema_version:
          type: string
        trace_id:
          type: string
        error_code:
          type: string
          enum: [OK]
        audit_id:
          type: string
        runtime_availability_summary:
          $ref: "#/components/schemas/RuntimeAvailabilitySummary"
    RuntimeAvailabilitySummary:
      type: object
      required:
        - contract_schema_version
        - agent_id
        - agent_version
        - artifact_hash
        - availability_state
        - display_name_zh
        - reason_code
        - reason
        - required_runtime_contract_version
        - runtime_contract_version
        - required_runtime_capabilities
        - runtime_capabilities
        - missing_runtime_capabilities
        - issues
        - source_of_truth
        - runtime_facts
        - next_action
      properties:
        contract_schema_version:
          type: string
          enum: [runtime_availability_summary.v1]
        agent_id:
          type: string
        agent_version:
          type: string
        artifact_hash:
          type: string
        availability_state:
          type: string
          enum:
            - runtime_missing
            - runtime_upgrade_required
            - runtime_capability_missing
            - runtime_ready
            - manifest_incomplete
        display_name_zh:
          type: string
        reason_code:
          type: string
        reason:
          type: string
        required_runtime_contract_version:
          type: string
        runtime_contract_version:
          type: string
        required_runtime_capabilities:
          type: array
          items:
            type: string
        runtime_capabilities:
          type: array
          items:
            type: string
        missing_runtime_capabilities:
          type: array
          items:
            type: string
        issues:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeAvailabilityIssue"
        source_of_truth:
          $ref: "#/components/schemas/RuntimeAvailabilitySourceOfTruth"
        runtime_facts:
          $ref: "#/components/schemas/RuntimeFacts"
        next_action:
          $ref: "#/components/schemas/ActionDescriptor"
    RuntimeAvailabilityIssue:
      type: object
      required: [issue_id, field_path, severity, reason, impact, fix_action_id, message_key]
      properties:
        issue_id:
          type: string
        field_path:
          type: string
        severity:
          type: string
          enum: [info, warning, error, blocked]
        reason:
          type: string
        impact:
          type: string
        fix_action_id:
          type: string
        message_key:
          type: string
    RuntimeAvailabilitySourceOfTruth:
      type: object
      required:
        - agent_manifest
        - runtime_availability
        - summary_projection
        - policy_decision
      properties:
        agent_manifest:
          type: string
          enum: [agent_store]
        runtime_availability:
          type: string
          enum: [agent_runtime_echo_or_probe]
        summary_projection:
          type: string
          enum: [agent_store]
        policy_decision:
          type: string
          enum: [agentops]
    RuntimeFacts:
      type: object
      required:
        - runtime_present
        - availability_echo_state
        - runtime_id
        - probe_ref
        - observed_at
      properties:
        runtime_present:
          type: boolean
        availability_echo_state:
          type: string
        runtime_id:
          type: string
        probe_ref:
          type: string
        observed_at:
          type: string
    ActionDescriptor:
      type: object
      required: [action_id, target_system, enabled, requires_permission, audit_required]
      properties:
        action_id:
          type: string
        target_system:
          type: string
          enum: [agent_store, agent_runtime]
        enabled:
          type: boolean
        requires_permission:
          type: boolean
        audit_required:
          type: boolean
        href:
          type: string
        message_key:
          type: string
    ErrorResponse:
      type: object
      required:
        - schema_version
        - trace_id
        - error_code
        - message_key
        - severity
        - retryable
        - recommended_action_id
      properties:
        schema_version:
          type: string
        trace_id:
          type: string
        error_code:
          type: string
          enum: [VALIDATION_ERROR, IDEMPOTENCY_KEY_CONFLICT]
        message_key:
          type: string
        severity:
          type: string
        retryable:
          type: boolean
        recommended_action_id:
          type: string
        support_ref:
          type: string
        audit_id:
          type: string
        details:
          type: object
