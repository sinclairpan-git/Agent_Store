openapi: 3.1.0
info:
  title: Agent Store Lifecycle Governance Baseline API
  version: 0.1.0
paths:
  /api/v1/agents/lifecycle-governance:
    post:
      operationId: applyLifecycleGovernanceTransition
      summary: Apply an audited Agent version lifecycle governance transition
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LifecycleGovernanceRequest"
      responses:
        "200":
          description: Lifecycle governance projection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LifecycleGovernanceResponse"
        "400":
          description: Malformed lifecycle governance request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Idempotency key conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    LifecycleGovernanceRequest:
      type: object
      required: [current_version, transition]
      properties:
        trace_id:
          type: string
        audit_id:
          type: string
        current_version:
          $ref: "#/components/schemas/CurrentVersion"
        transition:
          $ref: "#/components/schemas/LifecycleTransition"
    CurrentVersion:
      type: object
      required: [agent_id, version, artifact_hash]
      properties:
        agent_id:
          type: string
        version:
          type: string
        artifact_hash:
          type: string
        release_status:
          type: string
        lifecycle_state:
          type: string
          enum: [active, upgrade_available, rollback_available, deprecated, disabled, security_revoked]
    LifecycleTransition:
      type: object
      required: [transition_action, actor_id, actor_role, reason]
      properties:
        transition_action:
          type: string
          enum: [upgrade, rollback, deprecate, disable, security_revoke]
        actor_id:
          type: string
        actor_role:
          type: string
          enum: [owner, security]
        reason:
          type: string
        replacement_version:
          type: string
        target_version:
          type: string
        replacement_reason:
          type: string
        rollback_version:
          type: string
        rollback_reason:
          type: string
        affected_installation_count:
          type: integer
        affected_user_count:
          type: integer
        evidence_ref:
          type: string
        security_evidence_ref:
          type: string
        incident_id:
          type: string
    LifecycleGovernanceResponse:
      type: object
      required: [schema_version, trace_id, error_code, audit_id, lifecycle_governance]
      properties:
        schema_version:
          type: string
        trace_id:
          type: string
        error_code:
          type: string
          enum: [OK]
        audit_id:
          type: string
        lifecycle_governance:
          $ref: "#/components/schemas/LifecycleGovernance"
    LifecycleGovernance:
      type: object
      required:
        - contract_schema_version
        - agent_id
        - current_version
        - lifecycle_state
        - previous_state
        - transition_action
        - actor
        - version_scope
        - replacement
        - rollback
        - impact_scope
        - issues
        - source_of_truth
        - next_action
      properties:
        contract_schema_version:
          type: string
          enum: [lifecycle_governance_baseline.v1]
        agent_id:
          type: string
        current_version:
          type: string
        lifecycle_state:
          type: string
          enum: [active, upgrade_available, rollback_available, deprecated, disabled, security_revoked]
        previous_state:
          type: string
        transition_action:
          type: string
          enum: [upgrade, rollback, deprecate, disable, security_revoke]
        actor:
          $ref: "#/components/schemas/LifecycleActor"
        version_scope:
          $ref: "#/components/schemas/VersionScope"
        replacement:
          $ref: "#/components/schemas/ReplacementMapping"
        rollback:
          $ref: "#/components/schemas/RollbackMapping"
        impact_scope:
          $ref: "#/components/schemas/ImpactScope"
        issues:
          type: array
          items:
            $ref: "#/components/schemas/LifecycleGovernanceIssue"
        source_of_truth:
          $ref: "#/components/schemas/LifecycleSourceOfTruth"
        next_action:
          $ref: "#/components/schemas/ActionDescriptor"
    LifecycleActor:
      type: object
      required: [actor_id, actor_role, reason, evidence_ref]
      properties:
        actor_id:
          type: string
        actor_role:
          type: string
        reason:
          type: string
        evidence_ref:
          type: string
    VersionScope:
      type: object
      required: [agent_id, version, artifact_hash, release_status, lifecycle_state]
      properties:
        agent_id:
          type: string
        version:
          type: string
        artifact_hash:
          type: string
        release_status:
          type: string
        lifecycle_state:
          type: string
    ReplacementMapping:
      type: object
      required: [required, replacement_version, replacement_reason]
      properties:
        required:
          type: boolean
        replacement_version:
          type: string
        replacement_reason:
          type: string
    RollbackMapping:
      type: object
      required: [required, rollback_version, rollback_reason]
      properties:
        required:
          type: boolean
        rollback_version:
          type: string
        rollback_reason:
          type: string
    ImpactScope:
      type: object
      required:
        - impact_required
        - affected_installation_count
        - affected_user_count
        - replacement_available
        - notification_required
      properties:
        impact_required:
          type: boolean
        affected_installation_count:
          type: integer
        affected_user_count:
          type: integer
        replacement_available:
          type: boolean
        notification_required:
          type: boolean
    LifecycleGovernanceIssue:
      type: object
      required: [issue_id, field_path, severity, reason, impact, fix_action_id, message_key]
      properties:
        issue_id:
          type: string
          enum:
            - LIFECYCLE_ACTION_UNSUPPORTED
            - AGENT_VERSION_IDENTITY_REQUIRED
            - ACTOR_REQUIRED
            - LIFECYCLE_REASON_REQUIRED
            - OWNER_APPROVAL_REQUIRED
            - SECURITY_ACTOR_REQUIRED
            - SECURITY_EVIDENCE_REQUIRED
            - REPLACEMENT_VERSION_REQUIRED
            - ROLLBACK_VERSION_REQUIRED
            - IMPACT_SCOPE_REQUIRED
            - SECURITY_REVOKED_TERMINAL
        field_path:
          type: string
        severity:
          type: string
          enum: [info, warning, error, blocked]
        reason:
          type: string
        impact:
          type: string
        fix_action_id:
          type: string
        message_key:
          type: string
    LifecycleSourceOfTruth:
      type: object
      required:
        - agent_version
        - lifecycle_decision
        - replacement
        - impact_scope
        - agentops_notification
      properties:
        agent_version:
          type: string
          enum: [agent_store_agent_version]
        lifecycle_decision:
          type: string
          enum: [agent_store_lifecycle_governance]
        replacement:
          type: string
          enum: [agent_store_replacement_mapping]
        impact_scope:
          type: string
          enum: [agent_store_installation_inventory]
        agentops_notification:
          type: string
          enum: [agent_store_notification_queue]
    ActionDescriptor:
      type: object
      required: [action_id, target_system, enabled]
      properties:
        action_id:
          type: string
        target_system:
          type: string
          enum: [agent_store, agent_runtime, agentops, ai_autosdlc_cli, evidence_vault]
        enabled:
          type: boolean
        requires_permission:
          type: boolean
        audit_required:
          type: boolean
        href:
          type: string
        message_key:
          type: string
    ErrorResponse:
      type: object
      required:
        - schema_version
        - trace_id
        - error_code
        - message_key
        - severity
        - retryable
        - recommended_action_id
      properties:
        schema_version:
          type: string
        trace_id:
          type: string
        error_code:
          type: string
          enum: [VALIDATION_ERROR, IDEMPOTENCY_KEY_CONFLICT]
        message_key:
          type: string
        severity:
          type: string
        retryable:
          type: boolean
        recommended_action_id:
          type: string
        support_ref:
          type: string
        audit_id:
          type: string
        details:
          type: object
