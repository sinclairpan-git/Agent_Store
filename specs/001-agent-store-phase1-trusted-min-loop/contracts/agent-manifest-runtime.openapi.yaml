openapi: 3.1.0
info:
  title: Agent Store AgentManifest Runtime Contract API
  version: 0.1.0
paths:
  /api/v1/agent-manifests/runtime-contract-validations:
    post:
      operationId: validateAgentManifestRuntimeContract
      summary: Validate Store-owned AgentManifest fields required by Agent Runtime
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentManifestRuntimeContractRequest"
      responses:
        "200":
          description: AgentManifest runtime contract validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentManifestRuntimeContractResponse"
        "400":
          description: Malformed AgentManifest runtime contract request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Idempotency key conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    AgentManifestRuntimeContractRequest:
      type: object
      required: [agent_manifest]
      properties:
        trace_id:
          type: string
        audit_id:
          type: string
        runtime_capabilities:
          type: array
          items:
            type: string
        agent_manifest:
          $ref: "#/components/schemas/AgentManifest"
    AgentManifest:
      type: object
      required:
        - manifest_schema_version
        - agent_id
        - version
        - artifact_hash
        - runtime_contract_version
        - required_runtime_capabilities
        - skills
        - permission_intents
        - data_scopes
        - secret_refs
        - network_allowlist
        - observability_contract
        - guardrail_refs
        - rollback_policy
        - provenance
      properties:
        manifest_schema_version:
          type: string
        agent_id:
          type: string
        version:
          type: string
        artifact_hash:
          type: string
        runtime_contract_version:
          type: string
        required_runtime_capabilities:
          type: array
          items:
            type: string
        skills:
          type: array
          items:
            $ref: "#/components/schemas/AgentManifestSkillRef"
        permission_intents:
          type: array
          items:
            type: string
        data_scopes:
          type: array
          items:
            type: string
        secret_refs:
          type: array
          items:
            type: string
        network_allowlist:
          type: array
          items:
            type: string
        resource_budget:
          type: object
        observability_contract:
          $ref: "#/components/schemas/ObservabilityContract"
        guardrail_refs:
          type: array
          items:
            type: string
        eval_suite_refs:
          type: array
          items:
            type: string
        rollback_policy:
          type: string
        provenance:
          $ref: "#/components/schemas/ManifestProvenance"
    AgentManifestSkillRef:
      type: object
      required: [skill_id, skill_version]
      properties:
        skill_id:
          type: string
        skill_version:
          type: string
    ObservabilityContract:
      type: object
      required: [trace_spans]
      properties:
        trace_spans:
          type: array
          items:
            type: string
        event_types:
          type: array
          items:
            type: string
        outbox_required:
          type: boolean
    ManifestProvenance:
      type: object
      properties:
        source_repo:
          type: string
        source_commit:
          type: string
        build_ref:
          type: string
        issuer:
          type: string
    AgentManifestRuntimeContractResponse:
      type: object
      required:
        - schema_version
        - trace_id
        - error_code
        - audit_id
        - agent_manifest_runtime_contract
      properties:
        schema_version:
          type: string
        trace_id:
          type: string
        error_code:
          type: string
          enum: [OK]
        audit_id:
          type: string
        agent_manifest_runtime_contract:
          $ref: "#/components/schemas/AgentManifestRuntimeContract"
    AgentManifestRuntimeContract:
      type: object
      required:
        - contract_schema_version
        - agent_id
        - version
        - artifact_hash
        - manifest_status
        - runtime_compatibility
        - required_runtime_capabilities
        - runtime_capabilities
        - missing_runtime_capabilities
        - issues
        - source_of_truth
        - next_action
      properties:
        contract_schema_version:
          type: string
          enum: [agent_manifest_runtime_contract.v1]
        agent_id:
          type: string
        version:
          type: string
        artifact_hash:
          type: string
        manifest_status:
          type: string
          enum: [complete, incomplete]
        runtime_compatibility:
          type: string
          enum:
            - runtime_compatible
            - runtime_unknown
            - runtime_capability_missing
            - manifest_incomplete
        required_runtime_capabilities:
          type: array
          items:
            type: string
        runtime_capabilities:
          type: array
          items:
            type: string
        missing_runtime_capabilities:
          type: array
          items:
            type: string
        issues:
          type: array
          items:
            $ref: "#/components/schemas/AgentManifestRuntimeIssue"
        source_of_truth:
          $ref: "#/components/schemas/AgentManifestRuntimeSourceOfTruth"
        next_action:
          $ref: "#/components/schemas/ActionDescriptor"
    AgentManifestRuntimeIssue:
      type: object
      required: [issue_id, field_path, severity, reason, impact, fix_action_id, message_key]
      properties:
        issue_id:
          type: string
        field_path:
          type: string
        severity:
          type: string
          enum: [info, warning, error, blocked]
        reason:
          type: string
        impact:
          type: string
        fix_action_id:
          type: string
        message_key:
          type: string
    AgentManifestRuntimeSourceOfTruth:
      type: object
      required:
        - agent_manifest
        - package
        - skill_registry
        - runtime_availability
        - policy_decision
      properties:
        agent_manifest:
          type: string
          enum: [agent_store]
        package:
          type: string
          enum: [agent_store]
        skill_registry:
          type: string
          enum: [agent_store]
        runtime_availability:
          type: string
          enum: [agent_runtime_echo_or_probe]
        policy_decision:
          type: string
          enum: [agentops]
    ActionDescriptor:
      type: object
      required: [action_id, target_system, enabled, audit_required]
      properties:
        action_id:
          type: string
        target_system:
          type: string
        enabled:
          type: boolean
        audit_required:
          type: boolean
    ErrorResponse:
      type: object
      required:
        - schema_version
        - trace_id
        - error_code
        - message_key
        - severity
        - retryable
        - recommended_action_id
      properties:
        schema_version:
          type: string
        trace_id:
          type: string
        error_code:
          type: string
          enum: [VALIDATION_ERROR, IDEMPOTENCY_KEY_CONFLICT]
        message_key:
          type: string
        severity:
          type: string
        retryable:
          type: boolean
        recommended_action_id:
          type: string
        support_ref:
          type: string
        audit_id:
          type: string
        details:
          type: object
