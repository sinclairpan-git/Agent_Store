openapi: 3.1.0
info:
  title: Agent Store Package Validation API
  version: 0.1.0
paths:
  /api/v1/packages/validation-requests:
    post:
      operationId: validatePackageCandidate
      summary: Validate guided listing package metadata and return field-level fixes
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PackageValidationRequest"
      responses:
        "200":
          description: Package validation report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackageValidationResponse"
        "400":
          description: Malformed validation request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Idempotency key conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    PackageValidationRequest:
      type: object
      required: [package_manifest]
      properties:
        trace_id:
          type: string
        audit_id:
          type: string
        package_manifest:
          $ref: "#/components/schemas/PackageManifestCandidate"
    PackageManifestCandidate:
      type: object
      properties:
        agent_id:
          type: string
        display_name:
          type: string
        summary:
          type: string
        owner_team:
          type: string
        owner_user:
          type: string
        version:
          type: string
        entrypoint:
          type: string
        package_id:
          type: string
        manifest_lock:
          type: string
        sbom_ref:
          type: string
        scan_report_ref:
          type: string
        ai_generated_fields:
          type: array
          items:
            type: string
        field_sources:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/FieldSource"
        skills:
          type: array
          items:
            $ref: "#/components/schemas/SkillCandidate"
    FieldSource:
      type: object
      properties:
        source_id:
          type: string
        source_kind:
          type: string
          enum: [user_confirmed, repository_detected, ai_generated]
    SkillCandidate:
      type: object
      properties:
        skill_id:
          type: string
        skill_version:
          type: string
        schema_ref:
          type: string
        risk_level:
          type: string
          enum: [low, medium, high, critical]
        risk_justification:
          type: string
    PackageValidationResponse:
      type: object
      required: [schema_version, trace_id, error_code, audit_id, package_validation]
      properties:
        schema_version:
          type: string
        trace_id:
          type: string
        error_code:
          type: string
          enum: [OK]
        audit_id:
          type: string
        package_validation:
          $ref: "#/components/schemas/PackageValidationReport"
    PackageValidationReport:
      type: object
      required:
        - package_id
        - agent_id
        - validation_status
        - draft_status
        - issues
        - fix_prompts
        - source_of_truth
        - next_action
      properties:
        package_id:
          type: string
        agent_id:
          type: string
        validation_status:
          type: string
          enum: [passed, fixable, validation_failed]
        draft_status:
          type: string
          enum: [pending_review, fixable, validation_failed]
        issues:
          type: array
          items:
            $ref: "#/components/schemas/PackageValidationIssue"
        fix_prompts:
          type: array
          items:
            $ref: "#/components/schemas/FixPrompt"
        source_of_truth:
          $ref: "#/components/schemas/PackageValidationSourceOfTruth"
        next_action:
          $ref: "#/components/schemas/ActionDescriptor"
    PackageValidationIssue:
      type: object
      required: [issue_id, field_path, severity, reason, impact, fix_action_id, message_key]
      properties:
        issue_id:
          type: string
        field_path:
          type: string
        severity:
          type: string
          enum: [info, warning, error, blocked]
        reason:
          type: string
        impact:
          type: string
        fix_action_id:
          type: string
        message_key:
          type: string
    FixPrompt:
      type: object
      required: [prompt_id, target_field, title, prompt_text, source_issue_id, safe_to_apply_in_store]
      properties:
        prompt_id:
          type: string
        target_field:
          type: string
        title:
          type: string
        prompt_text:
          type: string
        source_issue_id:
          type: string
        safe_to_apply_in_store:
          type: boolean
    PackageValidationSourceOfTruth:
      type: object
      required: [package_manifest, validation_report, ai_generated_fields, skill_registry]
      properties:
        package_manifest:
          type: string
        validation_report:
          type: string
        ai_generated_fields:
          type: string
        skill_registry:
          type: string
    ActionDescriptor:
      type: object
      required: [action_id, target_system, enabled, audit_required]
      properties:
        action_id:
          type: string
        target_system:
          type: string
        enabled:
          type: boolean
        audit_required:
          type: boolean
    ErrorResponse:
      type: object
      required:
        - schema_version
        - trace_id
        - error_code
        - message_key
        - severity
        - retryable
        - recommended_action_id
      properties:
        schema_version:
          type: string
        trace_id:
          type: string
        error_code:
          type: string
          enum: [VALIDATION_ERROR, IDEMPOTENCY_KEY_CONFLICT]
        message_key:
          type: string
        severity:
          type: string
        retryable:
          type: boolean
        recommended_action_id:
          type: string
        support_ref:
          type: string
        audit_id:
          type: string
        details:
          type: object
