openapi: 3.1.0
info:
  title: Agent Store to AgentOps Deep Link API
  version: 0.1.0
paths:
  /api/v1/agents/store-ops-deep-links:
    post:
      operationId: buildStoreOpsDeepLink
      summary: Build a sanitized AgentOps Run Detail deep link from Store summaries
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StoreOpsDeepLinkRequest"
      responses:
        "200":
          description: Store to AgentOps deep link projection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreOpsDeepLinkResponse"
        "400":
          description: Malformed deep link request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Idempotency key conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    StoreOpsDeepLinkRequest:
      type: object
      properties:
        trace_id:
          type: string
        audit_id:
          type: string
        health_summary:
          $ref: "#/components/schemas/AgentOpsHealthSummaryLinkEcho"
        viewer_context:
          $ref: "#/components/schemas/ViewerContext"
    AgentOpsHealthSummaryLinkEcho:
      type: object
      required:
        - agent_id
        - agent_version
        - health_summary_id
        - run_id
        - session_id
      properties:
        agent_id:
          type: string
        agent_version:
          type: string
        health_summary_id:
          type: string
        run_id:
          type: string
        session_id:
          type: string
        evidence_summary_id:
          type: string
        agentops_run_detail_url:
          type: string
        raw_trace_url:
          type: string
        raw_evidence_url:
          type: string
    ViewerContext:
      type: object
      required:
        - can_view_agentops_run_detail
      properties:
        viewer_id:
          type: string
        can_view_agentops_run_detail:
          type: boolean
        return_path:
          type: string
    StoreOpsDeepLinkResponse:
      type: object
      required:
        - schema_version
        - trace_id
        - error_code
        - audit_id
        - store_ops_deep_link
      properties:
        schema_version:
          type: string
        trace_id:
          type: string
        error_code:
          type: string
          enum: [OK]
        audit_id:
          type: string
        store_ops_deep_link:
          $ref: "#/components/schemas/StoreOpsDeepLink"
    StoreOpsDeepLink:
      type: object
      required:
        - contract_schema_version
        - agent_id
        - agent_version
        - health_summary_id
        - run_id
        - session_id
        - evidence_summary_id
        - link_state
        - permission_state
        - target
        - return_path
        - raw_trace_exposed
        - raw_evidence_exposed
        - issues
        - source_of_truth
        - next_action
      properties:
        contract_schema_version:
          type: string
          enum: [store_ops_deep_link.v1]
        agent_id:
          type: string
        agent_version:
          type: string
        health_summary_id:
          type: string
        run_id:
          type: string
        session_id:
          type: string
        evidence_summary_id:
          type: string
        link_state:
          type: string
          enum:
            - deep_link_ready
            - permission_required
            - link_unavailable
            - link_sanitized
        permission_state:
          type: string
          enum: [allowed, evidence_vault_required, unavailable]
        target:
          $ref: "#/components/schemas/AgentOpsDeepLinkTarget"
        return_path:
          type: string
        raw_trace_exposed:
          type: boolean
          const: false
        raw_evidence_exposed:
          type: boolean
          const: false
        issues:
          type: array
          items:
            $ref: "#/components/schemas/StoreOpsDeepLinkIssue"
        source_of_truth:
          $ref: "#/components/schemas/StoreOpsDeepLinkSourceOfTruth"
        next_action:
          $ref: "#/components/schemas/ActionDescriptor"
    AgentOpsDeepLinkTarget:
      type: object
      required:
        - system
        - route
        - href
        - params
        - raw_trace_url
        - raw_evidence_url
      properties:
        system:
          type: string
          enum: [agentops]
        route:
          type: string
          enum: [run_detail]
        href:
          type: string
        params:
          type: object
          required: [run_id, session_id, return_path]
          properties:
            run_id:
              type: string
            session_id:
              type: string
            return_path:
              type: string
        raw_trace_url:
          type: string
          enum: [""]
        raw_evidence_url:
          type: string
          enum: [""]
    StoreOpsDeepLinkIssue:
      type: object
      required: [issue_id, field_path, severity, reason, impact, fix_action_id, message_key]
      properties:
        issue_id:
          type: string
          enum:
            - RUN_ID_REQUIRED
            - SESSION_ID_REQUIRED
            - RAW_TRACE_LINK_STRIPPED
        field_path:
          type: string
        severity:
          type: string
          enum: [info, warning, error, blocked]
        reason:
          type: string
        impact:
          type: string
        fix_action_id:
          type: string
        message_key:
          type: string
    StoreOpsDeepLinkSourceOfTruth:
      type: object
      required:
        - health_summary
        - run_detail
        - permission
        - raw_trace
        - projection
      properties:
        health_summary:
          type: string
          enum: [agentops]
        run_detail:
          type: string
          enum: [agentops]
        permission:
          type: string
          enum: [agent_store_viewer_context]
        raw_trace:
          type: string
          enum: [evidence_vault]
        projection:
          type: string
          enum: [agent_store]
    ActionDescriptor:
      type: object
      required: [action_id, target_system, enabled, requires_permission, audit_required]
      properties:
        action_id:
          type: string
        target_system:
          type: string
          enum: [agent_store, agentops, evidence_vault]
        enabled:
          type: boolean
        requires_permission:
          type: boolean
        audit_required:
          type: boolean
        href:
          type: string
        message_key:
          type: string
    ErrorResponse:
      type: object
      required:
        - schema_version
        - trace_id
        - error_code
        - message_key
        - severity
        - retryable
        - recommended_action_id
      properties:
        schema_version:
          type: string
        trace_id:
          type: string
        error_code:
          type: string
          enum: [VALIDATION_ERROR, IDEMPOTENCY_KEY_CONFLICT]
        message_key:
          type: string
        severity:
          type: string
        retryable:
          type: boolean
        recommended_action_id:
          type: string
        support_ref:
          type: string
        audit_id:
          type: string
        details:
          type: object
