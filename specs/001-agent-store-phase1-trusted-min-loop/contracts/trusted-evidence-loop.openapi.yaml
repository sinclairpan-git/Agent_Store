openapi: 3.1.0
info:
  title: Agent Store Trusted Evidence Loop Contract
  version: 0.1.0
paths:
  /api/v1/evidence-loop/assertions:
    post:
      operationId: assertTrustedEvidenceLoop
      summary: Verify Reporter event, AgentOps evidence, and Store display share the same trusted chain
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrustedEvidenceLoopAssertionRequest"
      responses:
        "200":
          description: Trusted loop verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrustedEvidenceLoopAssertionResponse"
        "409":
          description: Trusted loop mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    TrustedEvidenceLoopAssertionRequest:
      type: object
      required:
        - installation_id
        - device_id
        - agent_id
        - agent_version
        - artifact_hash
        - run_id
        - session_id
        - trace_id
        - reporter_event
        - evidence_summary_id
      properties:
        installation_id:
          type: string
        device_id:
          type: string
        agent_id:
          type: string
        agent_version:
          type: string
        artifact_hash:
          type: string
        run_id:
          type: string
        session_id:
          type: string
        trace_id:
          type: string
        reporter_event:
          $ref: "#/components/schemas/SignedReporterEvent"
        evidence_summary_id:
          type: string
        l5_gate_result:
          type: string
          enum: [passed, failed, pending, not_applicable]
        violation_scan_completed:
          type: boolean
    SignedReporterEvent:
      type: object
      required: [event_id, event_type, sequence_no, idempotency_key, event_hash, signature, key_id, signed_at]
      properties:
        event_id:
          type: string
        event_type:
          type: string
          enum: [session_started, run_started, step_completed, verification_completed, violation_scan_completed, artifact_emitted]
        sequence_no:
          type: integer
        idempotency_key:
          type: string
        event_hash:
          type: string
        signature:
          type: string
        key_id:
          type: string
        signed_at:
          type: string
          format: date-time
    TrustedEvidenceLoopAssertionResponse:
      type: object
      required: [schema_version, trace_id, error_code, result]
      properties:
        schema_version:
          type: string
        trace_id:
          type: string
        error_code:
          type: string
          enum: [OK]
        result:
          type: object
          required: [trusted_loop_verified, actual_l5_display_allowed, checked_refs]
          properties:
            trusted_loop_verified:
              type: boolean
            actual_l5_display_allowed:
              type: boolean
            checked_refs:
              type: array
              items:
                type: string
            degraded_reason:
              type: string
    ErrorResponse:
      type: object
      required: [schema_version, trace_id, error_code, message_key, severity, retryable, recommended_action_id]
      properties:
        schema_version:
          type: string
        trace_id:
          type: string
        error_code:
          type: string
          enum: [EVIDENCE_TRACE_MISMATCH, REPORTER_SIGNATURE_INVALID, RUN_ID_REQUIRED, SESSION_ID_REQUIRED, L5_GATE_INCOMPLETE, VIOLATION_SCAN_INCOMPLETE]
        message_key:
          type: string
        severity:
          type: string
          enum: [info, warning, error, blocked]
        retryable:
          type: boolean
        recommended_action_id:
          type: string
        audit_id:
          type: string
