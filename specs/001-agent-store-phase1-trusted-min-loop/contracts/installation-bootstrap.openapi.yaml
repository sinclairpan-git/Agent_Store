openapi: 3.1.0
info:
  title: Agent Store Installation Bootstrap API
  version: 0.1.0
security:
  - bearerAuth: []
paths:
  /api/v1/installations:
    post:
      operationId: createInstallation
      summary: Create installation and device binding
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInstallationRequest"
      responses:
        "201":
          description: Installation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstallationResponse"
        "400":
          description: Invalid installation request or missing idempotency key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller lacks permission to create installation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Agent version not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Package hash mismatch or idempotency conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/installations/{installation_id}/assertion:
    post:
      operationId: issueInstallationAssertion
      summary: Issue signed installation assertion
      parameters:
        - name: installation_id
          in: path
          required: true
          schema:
            type: string
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueAssertionRequest"
      responses:
        "200":
          description: Assertion issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstallationAssertionResponse"
        "400":
          description: Invalid assertion request or missing idempotency key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Caller auth context cannot access installation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Installation not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Assertion replay, device mismatch, expired assertion, or idempotency conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/installations/{installation_id}/bootstrap-status:
    get:
      operationId: getBootstrapStatus
      summary: Get manual activation bootstrap progress and recovery actions
      parameters:
        - name: installation_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Bootstrap status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapStatusResponse"
        "403":
          description: Caller auth context cannot access installation bootstrap status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    CreateInstallationRequest:
      type: object
      required: [agent_id, agent_version, device_os, artifact_hash, device_public_key_thumbprint]
      properties:
        agent_id:
          type: string
        agent_version:
          type: string
        user_id:
          type: string
          deprecated: true
          description: Derived from bearer token; clients must not use this as trusted identity input.
        device_os:
          type: string
          enum: [macOS, Windows, Linux]
        artifact_hash:
          type: string
        device_public_key_thumbprint:
          type: string
    InstallationResponse:
      type: object
      required: [schema_version, trace_id, error_code, installation]
      properties:
        schema_version:
          type: string
        trace_id:
          type: string
        error_code:
          type: string
          enum: [OK]
        installation:
          $ref: "#/components/schemas/Installation"
        auth_context:
          $ref: "#/components/schemas/AuthContext"
        permission_decision:
          $ref: "#/components/schemas/PermissionDecision"
    Installation:
      type: object
      required: [installation_id, device_id, agent_id, agent_version, artifact_hash, status, enterprise_state]
      properties:
        installation_id:
          type: string
        device_id:
          type: string
        agent_id:
          type: string
        agent_version:
          type: string
        artifact_hash:
          type: string
        status:
          type: string
          enum: [activation_required, reporter_pending, failed, revoked]
        enterprise_state:
          type: string
          enum: [detected_optional, required_unactivated, activating, active, degraded, disabled]
    AuthContext:
      type: object
      required: [auth_context_id, subject_user_id, identity_confidence]
      properties:
        auth_context_id:
          type: string
        subject_user_id:
          type: string
        tenant_id:
          type: string
        org_id:
          type: string
        project_id:
          type: string
        repo_ref:
          type: string
        identity_confidence:
          type: number
          minimum: 0
          maximum: 1
    PermissionDecision:
      type: object
      required: [permission_decision_id, decision, audit_id]
      properties:
        permission_decision_id:
          type: string
        decision:
          type: string
          enum: [allow, deny, approval_required]
        denied_scope:
          type: string
        request_access_url:
          type: string
        audit_id:
          type: string
        trace_id:
          type: string
    IssueAssertionRequest:
      type: object
      required: [device_public_key_thumbprint, nonce, audience]
      properties:
        device_public_key_thumbprint:
          type: string
        nonce:
          type: string
        audience:
          type: string
    InstallationAssertionResponse:
      type: object
      required:
        - schema_version
        - trace_id
        - error_code
        - assertion
        - agentops_handoff_assertion
        - agentops_credential_handoff_template
      properties:
        schema_version:
          type: string
        trace_id:
          type: string
        error_code:
          type: string
          enum: [OK]
        assertion:
          type: object
          required:
            - assertion_version
            - installation_id
            - device_id
            - artifact_hash
            - issuer
            - issued_at
            - expires_at
            - key_id
            - alg
            - canonicalization
            - audience
            - subject_user_id
            - nonce
            - replay_window_seconds
            - device_public_key_thumbprint
            - assertion_hash
            - revocation_status
            - signature
          properties:
            assertion_version:
              type: string
            installation_id:
              type: string
            device_id:
              type: string
            artifact_hash:
              type: string
            issuer:
              type: string
            issued_at:
              type: string
              format: date-time
            expires_at:
              type: string
              format: date-time
            key_id:
              type: string
            alg:
              type: string
            canonicalization:
              type: string
            audience:
              type: string
            subject_user_id:
              type: string
            nonce:
              type: string
            replay_window_seconds:
              type: integer
            device_public_key_thumbprint:
              type: string
            assertion_hash:
              type: string
            revocation_status:
              type: string
              enum: [not_revoked, revoked, unknown]
            signature:
              type: string
        agentops_handoff_assertion:
          type: object
          required:
            - assertion_version
            - issuer
            - key_id
            - algorithm
            - canonicalization
            - signature
            - assertion_hash
            - installation_id
            - device_id
            - device_public_key_thumbprint
            - agent_id
            - agent_version
            - artifact_hash
            - user_id
            - audience
            - nonce
            - replay_window_seconds
            - issued_at
            - expires_at
            - revocation_status
          properties:
            assertion_version:
              type: string
              enum: [signed_installation_assertion.v1]
            issuer:
              type: string
              enum: [agent-store]
            key_id:
              type: string
            algorithm:
              type: string
            canonicalization:
              type: string
              enum: [json-c14n-v1]
            signature:
              type: string
            assertion_hash:
              type: string
            installation_id:
              type: string
            device_id:
              type: string
            device_public_key_thumbprint:
              type: string
            agent_id:
              type: string
            agent_version:
              type: string
            artifact_hash:
              type: string
            user_id:
              type: string
            audience:
              type: string
            nonce:
              type: string
            replay_window_seconds:
              type: integer
            issued_at:
              type: string
              format: date-time
            expires_at:
              type: string
              format: date-time
            revocation_status:
              type: string
              enum: [not_revoked, revoked, unknown]
        agentops_credential_handoff_template:
          type: object
          required:
            - schema_version
            - bootstrap_id
            - installation_assertion
            - device_proof
            - trace_id
            - audit_id
            - return_url
            - next_action
          properties:
            schema_version:
              type: string
              enum: [agentops_credential_handoff.v1]
            bootstrap_id:
              type: string
            installation_assertion:
              type: object
              required:
                - assertion_version
                - issuer
                - key_id
                - algorithm
                - canonicalization
                - signature
                - assertion_hash
                - installation_id
                - device_id
                - device_public_key_thumbprint
                - agent_id
                - agent_version
                - artifact_hash
                - user_id
                - audience
                - nonce
                - replay_window_seconds
                - issued_at
                - expires_at
                - revocation_status
              properties:
                assertion_version:
                  type: string
                  enum: [signed_installation_assertion.v1]
                issuer:
                  type: string
                  enum: [agent-store]
                key_id:
                  type: string
                algorithm:
                  type: string
                canonicalization:
                  type: string
                  enum: [json-c14n-v1]
                signature:
                  type: string
                assertion_hash:
                  type: string
                installation_id:
                  type: string
                device_id:
                  type: string
                device_public_key_thumbprint:
                  type: string
                agent_id:
                  type: string
                agent_version:
                  type: string
                artifact_hash:
                  type: string
                user_id:
                  type: string
                audience:
                  type: string
                nonce:
                  type: string
                replay_window_seconds:
                  type: integer
                issued_at:
                  type: string
                  format: date-time
                expires_at:
                  type: string
                  format: date-time
                revocation_status:
                  type: string
                  enum: [not_revoked, revoked, unknown]
            device_proof:
              type: object
              nullable: true
            trace_id:
              type: string
            audit_id:
              type: string
            return_url:
              type: string
            next_action:
              $ref: "#/components/schemas/ActionDescriptor"
    BootstrapStatusResponse:
      type: object
      required: [schema_version, trace_id, error_code, status]
      properties:
        schema_version:
          type: string
        trace_id:
          type: string
        error_code:
          type: string
          enum: [OK]
        status:
          type: object
          required: [installation_id, bootstrap_status, current_step, step_status, primary_action]
          properties:
            installation_id:
              type: string
            bootstrap_status:
              type: string
              enum: [not_started, assertion_issued, device_bound, credential_issued, signature_verified, expired, failed]
            current_step:
              type: string
              enum: [issue_assertion, bind_device, issue_credential, signature_test, complete]
            step_status:
              type: string
              enum: [not_started, running, succeeded, failed, blocked]
            next_poll_after:
              type: integer
            retryable:
              type: boolean
            retry_after:
              type: integer
            regenerate_command_url:
              type: string
            diagnostic_ref:
              type: string
            last_error_code:
              type: string
            safe_to_rerun:
              type: boolean
            primary_action:
              $ref: "#/components/schemas/ActionDescriptor"
            secondary_actions:
              type: array
              items:
                $ref: "#/components/schemas/ActionDescriptor"
    ActionDescriptor:
      type: object
      required: [action_id, target_system, enabled]
      properties:
        action_id:
          type: string
        target_system:
          type: string
          enum: [agent_store, agentops, ai_autosdlc_cli, evidence_vault]
        enabled:
          type: boolean
        href:
          type: string
        audit_required:
          type: boolean
    ErrorResponse:
      type: object
      required: [schema_version, trace_id, error_code, message_key, severity, retryable, recommended_action_id]
      properties:
        schema_version:
          type: string
        trace_id:
          type: string
        error_code:
          type: string
          enum: [PACKAGE_HASH_MISMATCH, INSTALLATION_ASSERTION_EXPIRED, ASSERTION_REPLAY_DETECTED, ASSERTION_REVOKED, ASSERTION_SIGNATURE_INVALID, AUDIENCE_MISMATCH, DEVICE_KEY_MISMATCH, PERMISSION_DENIED, VALIDATION_ERROR]
        message:
          type: string
          deprecated: true
        message_key:
          type: string
        severity:
          type: string
          enum: [info, warning, error, blocked]
        retryable:
          type: boolean
        recommended_action_id:
          type: string
        support_ref:
          type: string
        audit_id:
          type: string
